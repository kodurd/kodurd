<svg viewBox="0 0 800 260" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#58a6ff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- connections from "it" to other tokens -->
  <g fill="none" stroke-linecap="round">
    <path d="M 620 95 Q 450 20 80 95" stroke="#f78166" stroke-width="1">
      <animate attributeName="stroke-width" values="1;5;1" dur="4s" begin="0s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.15;0.9;0.15" dur="4s" begin="0s" repeatCount="indefinite"/>
    </path>
    <path d="M 620 95 Q 480 30 210 95" stroke="#3fb950" stroke-width="1">
      <animate attributeName="stroke-width" values="1;7;1" dur="4s" begin="0.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.15;1;0.15" dur="4s" begin="0.6s" repeatCount="indefinite"/>
    </path>
    <path d="M 620 95 Q 520 40 340 95" stroke="#a371f7" stroke-width="1">
      <animate attributeName="stroke-width" values="1;2;1" dur="4s" begin="1.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.15;0.5;0.15" dur="4s" begin="1.2s" repeatCount="indefinite"/>
    </path>
    <path d="M 620 95 Q 560 50 470 95" stroke="#d29922" stroke-width="1">
      <animate attributeName="stroke-width" values="1;3;1" dur="4s" begin="1.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.15;0.6;0.15" dur="4s" begin="1.8s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- tokens -->
  <g>
    <rect x="30" y="95" width="100" height="42" rx="8" fill="#161b22" stroke="#30363d"/>
    <text x="80" y="122" fill="#c9d1d9" font-size="15" text-anchor="middle">The</text>

    <rect x="160" y="95" width="100" height="42" rx="8" fill="#161b22" stroke="#30363d"/>
    <text x="210" y="122" fill="#c9d1d9" font-size="15" text-anchor="middle">model</text>

    <rect x="290" y="95" width="100" height="42" rx="8" fill="#161b22" stroke="#30363d"/>
    <text x="340" y="122" fill="#c9d1d9" font-size="15" text-anchor="middle">shipped</text>

    <rect x="420" y="95" width="100" height="42" rx="8" fill="#161b22" stroke="#30363d"/>
    <text x="470" y="122" fill="#c9d1d9" font-size="15" text-anchor="middle">because</text>

    <rect x="570" y="95" width="100" height="42" rx="8" fill="#0d1117" stroke="#58a6ff" stroke-width="2"/>
    <text x="620" y="122" fill="#58a6ff" font-size="15" text-anchor="middle" font-weight="bold">it</text>
    <rect x="570" y="95" width="100" height="42" rx="8" fill="none" stroke="#58a6ff">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="4s" repeatCount="indefinite"/>
    </rect>

    <rect x="700" y="95" width="70" height="42" rx="8" fill="#161b22" stroke="#30363d"/>
    <text x="735" y="122" fill="#c9d1d9" font-size="15" text-anchor="middle">worked</text>
  </g>

  <!-- attention weights bar -->
  <g>
    <text x="30" y="185" fill="#8b949e" font-size="11">attention from "it"</text>
    <rect x="30" y="196" width="740" height="3" rx="2" fill="#21262d"/>
    <rect x="30" y="196" height="3" rx="2" fill="url(#g1)">
      <animate attributeName="width" values="0;740" dur="4s" repeatCount="indefinite"/>
    </rect>
  </g>

  <text x="400" y="235" fill="#6e7681" font-size="12" text-anchor="middle">every token looks at every other token — that's the whole trick</text>
</svg>
